[pytest]
# ---------------------------------------------------------------------------
# behave_fire — pytest configuration
# ---------------------------------------------------------------------------

# Add src/behave_fire/ to sys.path before any test module (or __init__.py) is
# imported.  This is equivalent to the  sys.path.insert(0, …)  that both
# test files do manually, but it fires early enough for pytest collection.
# Requires pytest >= 7.0 (this project uses 9.0.2).
pythonpath = src/behave_fire

# Where pytest looks for tests
testpaths = src/behave_fire/tests

# Suppress the extra pytest header/summary to keep output close to the
# direct-run style used in test_behave.py / test_behave_array.py
addopts = --no-header -q

# Only collect files that match this pattern.
# test_behave_array.py matches; test_behave.py does NOT because it uses
# a custom script harness with (test_info, behave_run) arguments that are
# not pytest fixtures — run it directly: python tests/test_behave.py
python_files = test_*_array.py
